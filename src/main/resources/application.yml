spring:
  profiles:
    group:
      "local": "local,common"
      "dev": "dev,common"
      "prod": "prod,common"

---
# ?? ?? ??
spring:
  config:
    activate:
      on-profile: "local"
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:tcp://localhost/~/dpcms
    username: root
    password: '0000'
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        #show_sql: true # ??? ??? ??
        format_sql: true
        default_batch_fetch_size: 1000
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false # OSIV ??

---

# ??
spring:
  config:
    activate:
      on-profile: "common"
  thymeleaf:
    cache: false
  devtools:
    restart:
      enabled: true
  data:
    web:
      pageable:
        one-indexed-parameters: true


server:
  port: 8080
  error:
    include-exception: false
    include-stacktrace: never # ?? ??? stacktrace ??? ??? ? ??

logging:
  level:
    root: WARN

    org.springframework.web: INFO
    org.springframework.security: INFO

# Spring Security
security:
  ## ?? ???
  session:
    use: true
    ### ?? ?? ???
    max-count: 1

  ## ?? ???
  remember-me:
    use: false
    ### ????? ????(n? ?? ??)
    expire:
      seconds: 2629800

  ## ???? ??
  credentials-expired:
    use: true
    ### ???? ?? ? ????? uri
    redirect: /credentialExpired
    ### ???? ???? (?,?)
    month: 1
    data:

  ## ????
  signup:
    uri: /signup
    process:
      uri: /signupProcess

  ## ???
  login:
    uri: /login
    ### form ????
    param:
      id: memberId
      pwd: memberPassword
    process:
      uri: /loginProcess
    ### ??? ?? ? ????? uri
    success:
      redirect-uri: /
    fail:
      imsi-lock: # ???? ???? ?? ??
        use: true
        recount:
          use: true
          max-minute: 1 # ?? ?? ??
        max-count: 5 # ?? ?? ??
        lock-minute: 30 # ???? ?? ?? ? ??? ??? ??
      redirect-uri:
        default: ${security.login.uri}?error=true
        notApprove:
        inactive:
        userNotFound:
        badCredentials:
  ## ????
  logout:
    uri: /logout
  permitAll: >
    ${security.login.uri},
    ${security.login.process.uri},
    ${security.signup.uri},
    ${security.signup.process.uri}
  



